name: esbn-to-mqtt
version: "0.4.0"
slug: esbn_to_mqtt
description: Publish ESB Networks smart meter HDF data to Home Assistant MQTT sensors
url: https://github.com/omgapuppy/esbn-to-mqtt/tree/main/esbn-to-mqtt
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
stage: stable
services:
  - mqtt:need
options:
  esbn_username: null
  esbn_password: null
  mprn: null
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: null
  mqtt_password: null
  poll_interval_hours: 6
  mqtt_discovery_prefix: homeassistant
  mqtt_topic_prefix: esbn_to_mqtt
  captcha_solver: disabled
  two_captcha_timeout_seconds: 120
  tariff_enabled: false
  tariff_day_rate_eur_per_kwh: 0.0
  tariff_night_rate_eur_per_kwh: 0.0
  tariff_peak_rate_eur_per_kwh: 0.0
  tariff_currency: EUR
  log_level: info
schema:
  esbn_username: email
  esbn_password: password
  mprn: match(^\d{11}$)
  mqtt_host: str
  mqtt_port: port
  mqtt_username: str
  mqtt_password: password
  poll_interval_hours: int(1,)
  mqtt_discovery_prefix: str
  mqtt_topic_prefix: match(^[A-Za-z0-9_-]+$)
  captcha_solver: list(disabled|2captcha)
  two_captcha_api_key: password?
  two_captcha_timeout_seconds: int(30,600)
  tariff_enabled: bool
  tariff_day_rate_eur_per_kwh: float(0,)
  tariff_night_rate_eur_per_kwh: float(0,)
  tariff_peak_rate_eur_per_kwh: float(0,)
  tariff_currency: match(^[A-Za-z]{3}$)
  log_level: list(trace|debug|info|notice|warning|error|fatal)
image: ghcr.io/omgapuppy/{arch}-esbn-to-mqtt
